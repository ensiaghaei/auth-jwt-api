services:
  postgres:
    image: postgres:16
    container_name: auth_jwt_postgres
    environment:
      POSTGRES_DB: auth_jwt_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"
    volumes:
      - auth_jwt_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: auth_jwt_api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
volumes:
  auth_jwt_data: